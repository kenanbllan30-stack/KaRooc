<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaRooc Games - منصة الألعاب الحية</title>
    <style>
        body { background-color: #12121c; color: #fff; font-family: Tahoma, sans-serif; margin: 0; padding: 0; text-align: center; }
        .header { background: linear-gradient(135deg, #4a148c, #7b1fa2); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .balance-box, .id-box { font-size: 12px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 6px 10px; border-radius: 20px; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .game-card { background: #1e1e2f; border: 2px solid #7c4dff; border-radius: 15px; padding: 20px; margin-top: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .play-btn { background: #00e676; color: #12121c; border: none; padding: 12px 25px; font-weight: bold; border-radius: 25px; cursor: pointer; font-size: 15px; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,230,118,0.4); }
    </style>
</head>
<body>
    <div class="header">
        <div class="balance-box">💰 الرصيد: <span id="userBalance">5000</span> ل.س</div>
        <div class="id-box">🎮 ID: <span id="userId">7956980808</span></div>
    </div>
    <div class="container">
        <div class="game-card">
            <h2 style="color: #7c4dff; margin-top: 0;">🎮 ألعاب KaRooc الحية</h2>
            <p style="font-size: 13px; color: #ccc;">اختر لعبتك المفضلة، استمتع بالمنافسة، وضاعف رصيدك الحقيقي الآن!</p>
            <button class="play-btn" onclick="alert('جارٍ بدء اللعبة... بالتوفيق!')">🚀 العب الآن برصيدك</button>
        </div>
    </div>
</body>
</html>
